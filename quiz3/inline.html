<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Cách 1 — Inline JS</title>
  <style>
    body { background:#0f1117; color:#e2e8f0; font-family:'Segoe UI',sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:1rem; }
    h1 { font-size:1.4rem; color:#93c5fd; }
    p.note { font-size:0.85rem; color:#64748b; max-width:400px; text-align:center; }
    code { background:#1e2433; color:#f59e0b; padding:0.15em 0.4em; border-radius:4px; }
    button { background:#4f86f7; color:#fff; border:none; border-radius:8px; padding:0.6rem 1.4rem; font-size:1rem; font-weight:600; cursor:pointer; }
    button:hover { background:#3b6fd4; }
  </style>
</head>
<body>
  <h1>⚡ Cách 1: Inline JavaScript</h1>
  <p class="note">JS viết thẳng vào thuộc tính <code>onclick</code> của thẻ HTML.</p>

  <!-- Inline: JS nằm trực tiếp trong attribute onclick -->
  <button onclick="alert('Xin chào từ Inline JS! 🎉')">Bấm tôi</button>

  <p class="note">
    ✅ Nhanh, không cần file riêng<br>
    ❌ Khó bảo trì, không tái sử dụng được
  </p>
</body>
</html>
